version: '3.9'
services:
  qdrant:
    image: qdrant/qdrant:v1.8.2
    ports:
      - '6333:6333'
    volumes:
      - qdrant_data:/qdrant/storage
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: legal
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
volumes:
  qdrant_data:
  pg_data:
  redis_data:

